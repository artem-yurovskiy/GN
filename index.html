<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Good Night, Lauren</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at bottom, #0b1026 0%, #03030a 70%);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  /* ---------- Sky ---------- */
  #sky {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle linear infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .shooting-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: linear-gradient(-45deg, #fff, rgba(255,255,255,0));
    border-radius: 50%;
    filter: drop-shadow(0 0 6px #fff);
    animation: shoot 4.5s linear infinite;
    opacity: 0;
  }

  @keyframes shoot {
    0% { transform: translate(0, 0) rotate(-45deg) scaleX(0); opacity: 0; }
    2% { opacity: 1; }
    12% { transform: translate(-260px, 260px) rotate(-45deg) scaleX(220); opacity: 0; }
    100% { opacity: 0; }
  }

  .moon {
    position: absolute;
    top: 8%;
    right: 10%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #fdf6e3;
    box-shadow:
      inset -18px -6px 0 0 #e9dcb0,
      0 0 40px 10px rgba(253, 246, 227, 0.5),
      0 0 90px 30px rgba(253, 246, 227, 0.25);
    animation: floatMoon 8s ease-in-out infinite;
  }

  @keyframes floatMoon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(18px); }
  }

  .cloud {
    position: absolute;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 50px;
    filter: blur(1px);
    animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: "";
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }

  @keyframes drift {
    from { transform: translateX(-20vw); }
    to { transform: translateX(120vw); }
  }

  /* ---------- Text ---------- */
  #stage {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.5rem, 2vw, 1.5rem);
  }

  .word {
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    background: linear-gradient(90deg, #ffe9c7, #fff6e0, #ffd7ec, #ffe9c7);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 25px rgba(255, 230, 200, 0.35));
    opacity: 0;
    animation-fill-mode: backwards;
  }

  #goodnight {
    font-size: clamp(2.5rem, 9vw, 6rem);
    animation:
      appearGoodnight 1.6s ease-out forwards 2s,
      glow 3s ease-in-out infinite 2s,
      jiggle 4s ease-in-out infinite 3.6s;
  }

  #lauren {
    font-size: clamp(3.5rem, 13vw, 9rem);
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    animation:
      appearLauren 1.8s ease-out forwards 4.2s,
      glow 3s ease-in-out infinite 4.2s,
      jiggle 4.5s ease-in-out infinite 6s;
  }

  @keyframes appearGoodnight {
    0%   { opacity: 0; transform: translateY(40px) scale(0.85); letter-spacing: 10px; }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 2px; }
  }

  @keyframes appearLauren {
    0%   { opacity: 0; transform: translateY(30px) scale(0.7) rotate(-3deg); }
    50%  { opacity: 1; }
    70%  { transform: translateY(0) scale(1.08) rotate(1deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  }

  @keyframes glow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes jiggle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    20%      { transform: translateY(-5px) rotate(-1.4deg); }
    45%      { transform: translateY(1px) rotate(1deg); }
    70%      { transform: translateY(-2px) rotate(-0.6deg); }
    85%      { transform: translateY(2px) rotate(0.8deg); }
  }

</style>
</head>
<body>

<div id="sky">
  <div class="moon"></div>
</div>

<div id="stage">
  <div class="word" id="goodnight">Good&nbsp;Night!</div>
  <div class="word" id="lauren">Lauren</div>
</div>

<script>
  // Stars
  const sky = document.getElementById('sky');
  const STAR_COUNT = 140;
  for (let i = 0; i < STAR_COUNT; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.2 + 0.6;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    s.style.animationDelay = (Math.random() * 4) + 's';
    sky.appendChild(s);
  }

  // Shooting stars
  for (let i = 0; i < 4; i++) {
    const sh = document.createElement('div');
    sh.className = 'shooting-star';
    sh.style.top = (Math.random() * 40) + 'vh';
    sh.style.left = (50 + Math.random() * 40) + 'vw';
    sh.style.animationDelay = (Math.random() * 6 + i * 2) + 's';
    sky.appendChild(sh);
  }

  // Clouds
  for (let i = 0; i < 3; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    const w = 120 + Math.random() * 100;
    const h = w * 0.35;
    c.style.width = w + 'px';
    c.style.height = h + 'px';
    c.style.top = (10 + Math.random() * 60) + 'vh';
    c.style.animationDuration = (40 + Math.random() * 30) + 's';
    c.style.animationDelay = (-Math.random() * 40) + 's';
    sky.appendChild(c);
  }
</script>

</body>
</html>
